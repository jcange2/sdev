<!DOCTYPE html>
<html>
<head>
    <title>My First Page</title>

    <style>
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 70px;
            background-color: #274e13ff;
        }

        .brand {
            font-size: 32px;
            font-weight: bold;
            color: white
        }

        .nav a {
            font-size: 18px;
            margin-left: 18px;
            text-decoration: none;
            color: white;
        }
        
        .intro {
            text-align: center;
            margin-top: 40px;
        }

        .intro h2 {
            font-size: 32px;
            margin-bottom: 5px;
        }

        .intro h3 {
            font-size: 20px;
            font-weight: normal;
            color: gray;
            margin-top: 0;
        }

        .title-box {
            background-color: #d9ebd3ff;
            padding: 40px;
            margin: 20px auto;
            text-align: center;
            width: fit-content;
            border-radius: 10px; 
        }

        .title {
            margin: 0;
            font-size: 32px;
            line-height: 1.3;
        }

    </style>
</head>

<body>
    <header class="header">
        <div class="brand">WildApothecary</div>

        <nav class="nav">
            <a href="#">Home</a>
            <a href="#">Common Weeds</a>
            <a href="#">About Us</a>
        </nav>
    </header>

    <section class="intro">
    <h2 class="title">
        Common Weeds<br>
        Remarkable Benefits
    </h2>

    <p>
        Explore the weeds growing around us, like dandelion, plantain, and nettle.
        Learn their traditional uses and wellness-friendly properties.
    </p>
</section>
    
</body>
</html>
