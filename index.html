<!DOCTYPE html>
<html>
<head>
    <title>My First Page</title>

    <style>
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 70px;
            background-color: #274e13ff;
        }

        .brand {
            font-size: 32px;
            font-weight: bold;
            color: white;
        }

        .nav a {
            font-size: 18px;
            margin-left: 18px;
            text-decoration: none;
            color: white;
        }
        
        .intro {
            text-align: center;
            margin-top: 40px;
        }

        .title-box {
            background-color: #d9ebd3ff;
            padding: 40px;
            margin: 20px auto;
            width: fit-content;
            border-radius: 10px;
        }

        .title {
            margin: 0;
            font-size: 32px;
            line-height: 1.3;
        }

        .intro p {
            font-size: 18px;
            line-height: 1.6;
            max-width: 600px;
            margin: 20px auto; 
        }

        .gallery {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 60px;
        }

        .card {
            display: block;
            text-align: center;
            text-decoration: none;
            color: black;
        }

        .card img {
            width: 200px;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            transition: transform 0.3s ease;
        }

        .card img:hover {
            transform: scale(1.05);
        }

        .card p {
            margin-top: 10px;
            font-size: 16px;
        }

    </style>
</head>

<body>
    <header class="header">
        <div class="brand">WildApothecary</div>

        <nav class="nav">
            <a href="#">Home</a>
            <a href="#">Common Weeds</a>
            <a href="#">About Us</a>
        </nav>
    </header>

    <section class="intro">

    <div class="title-box">
        <h2 class="title">
            Common Weeds<br>
            Remarkable Benefits
        </h2>
    </div>
        
    <p>
        Explore the weeds growing around us, like dandelion, nettle, and clover.
        Learn their traditional uses and wellness-friendly properties.
    </p>
        
</section>

    <section class="gallery">

    <a href="#" class="card">
        <img src="dandelion.jpg" alt="Dandelion">
        <p>Dandelion</p>
    </a>

    <a href="#" class="card">
        <img src="nettle.jpg" alt="Nettle">
        <p>Nettle</p>
    </a>

    <a href="#" class="card">
        <img src="clover.jpg" alt="Clover">
        <p>Clover</p>
    </a>

</section>
    
</body>
    
</html>
