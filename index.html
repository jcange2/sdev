<!DOCTYPE html>

<head>

    <style>
        .header {

            justify-content: space-between;
            align-items: center;
            padding: 70px;
            background-color: #274e13ff;
        }

        .brand {
            font-size: 32px;
            font-weight: bold;
            color: white
        }

        .nav a {
            font-size: 18px;
            margin-left: 18px;
            text-decoration: none;

        }

            margin-top: 40px;

        }

        .title {

        .intro p {

        </nav>

    <section class="intro">

    <div class="title-box">
        <h2 class="title">
            Common Weeds<br>
